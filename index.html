<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everybody Hates Clara - Landing Page</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ff0000; /* Fondo Rojo Puro */
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 40px 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* FONDO DIVIDIDO: VIDEO EN LA SECCIÓN SUPERIOR AMPLITUD 78% */
        .video-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 78vh;
            overflow: hidden;
            z-index: -2;
            background-color: #000;
        }

        .video-bg-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45; 
        }

        /* LÍNEA DIVISORIA MARQUESINA */
        .marquee-divider {
            position: absolute;
            top: 78vh;
            left: 0;
            width: 100%;
            background-color: #000000;
            border-top: 3px solid #FFFFFF;
            border-bottom: 3px solid #FFFFFF;
            padding: 8px 0;
            z-index: 10;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
        }

        .marquee-text {
            display: inline-block;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFFFFF;
            animation: marquee 25s linear infinite;
            padding-left: 100%;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            position: relative;
            z-index: 5;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 1.2fr 1fr; 
                gap: 80px;
                align-items: start;
            }
        }

        /* COLUMNA IZQUIERDA */
        .header-section {
            display: flex;
            flex-direction: column;
        }

        .subtitle-top {
            font-size: clamp(0.7rem, 1.2vw, 0.85rem);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 24px;
            line-height: 1.3;
            max-width: 550px;
            text-shadow: 2px 2px 0px #000;
        }

        .main-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3.2rem, 7.5vw, 6.5rem); 
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -2px;
            word-wrap: break-word;
            text-shadow: 4px 4px 0px #000;
        }

        /* COLUMNA DERECHA: BARRAS PUNK DESPLEGABLES */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
            position: relative;
        }

        .punk-accordion {
            background-color: #000000;
            color: #FFFFFF;
            border: 3px solid #FFFFFF;
            font-family: 'Archivo Black', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            padding: 14px 20px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: background-color 0.2s;
            z-index: 6;
            clip-path: polygon(0% 0%, 96% 0%, 100% 30%, 98% 75%, 100% 100%, 4% 100%, 0% 80%);
        }

        .punk-accordion:hover {
            background-color: #ff0000;
            color: #000000;
            border-color: #000000;
        }

        .punk-accordion::after {
            content: ' ✚';
            font-size: 0.9rem;
            float: right;
        }

        .punk-accordion.active::after {
            content: ' ✖';
        }

        .punk-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: rgba(255, 255, 255, 0.95);
            color: #000000;
            border-left: 4px solid #000000;
            border-right: 4px solid #000000;
            margin-bottom: 10px;
            z-index: 6;
        }

        .paragraph {
            padding: 18px;
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            line-height: 1.5;
            text-transform: uppercase; 
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: justify;
        }

        /* SECCIÓN DEL REPRODUCTOR Y VIDEO ALTO */
        .player-multimedia-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            width: 100%;
            position: relative;
        }

        @media (min-width: 576px) {
            .player-multimedia-wrapper {
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }
        }

        /* CONTENEDOR VIDEO ALTO */
        .alto-video-container {
            max-width: 180px;
            width: 100%;
            box-shadow: 6px 6px 0px #000;
            border: 3px solid #ffffff;
            background-color: #000;
            transform: rotate(-4deg);
            overflow: hidden;
        }

        .alto-video-container video {
            width: 100%;
            display: block;
            height: auto;
            object-fit: cover;
        }

        /* REPRODUCTOR DE CD ESTILO VINTAGE / ANALÓGICO */
        .cd-player-container {
            max-width: 400px;
            background: #111111;
            border: 4px solid #FFFFFF;
            padding: 24px;
            text-align: center;
            width: 100%;
            box-shadow: 9px 9px 0px #000;
            position: relative;
            z-index: 6;
        }

        .cd-player-container::before {
            content: "";
            position: absolute;
            top: 10px;
            right: 15px;
            width: 40px;
            height: 4px;
            background: repeating-linear-gradient(90deg, #555, #555 4px, transparent 4px, transparent 8px);
        }

        .cd-song-title {
            font-size: 0.85rem;
            font-family: 'Archivo Black', sans-serif;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            border: 2px solid #333;
            background-color: #000;
            padding: 6px;
            color: #00ff33;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .led-indicator {
            width: 8px;
            height: 8px;
            background-color: #550000;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        .led-indicator.active {
            background-color: #00ff33;
            box-shadow: 0 0 8px #00ff33;
        }

        .cd-disc {
            width: 190px;
            height: 190px;
            margin: 0 auto 24px auto;
            border-radius: 50%;
            border: 4px solid #222;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 21%, transparent 22%),
                        repeating-radial-gradient(circle, #222, #222 2px, #111 4px, #333 6px);
            box-shadow: 0px 0px 15px rgba(0,0,0,0.7);
            animation: spin 3.5s linear infinite;
            animation-play-state: paused; 
        }

        .cd-disc.playing {
            animation-play-state: running;
        }

        .cd-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.65;
            mix-blend-mode: luminosity;
            z-index: 1;
        }

        .cd-center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background-color: #111111; 
            border: 5px double #ffffff;
            border-radius: 50%;
            z-index: 3;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .cd-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-control {
            background: #222;
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            padding: 10px 18px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.1s;
        }

        .btn-control:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .btn-control:hover {
            background-color: #ff0000;
            color: #FFFFFF;
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #000;
            padding: 6px;
            border: 1px solid #333;
        }

        .volume-label {
            font-size: 0.7rem;
            font-family: 'Archivo Black', sans-serif;
            color: #aaa;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: #555;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 16px;
            background: #FFFFFF;
            border: 1px solid #000;
        }

        /* STICKERS INTERACTIVOS Y ARRASTRABLES (CON ARCHIVOS .PNG) */
        .draggable-sticker {
            position: absolute;
            z-index: 99;
            cursor: move;
            user-select: none;
            touch-action: none;
